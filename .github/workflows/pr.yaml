name: Pull Request Requirements

on:
  pull_request:
    branches: ["*.*.x", "*.x", "master", "next", "next-major", "beta", "alpha"]

  workflow_call: # allow this workflow to be called by other workflows

jobs:
  unit_tests:
    runs-on: [self-hosted, ubuntu-22-04, regular]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node Environment
        uses: ./.github/setup-node

      - name: Build
        run: npm run asbuild

      - name: Build body example
        run: cd examples/body && pnpm install && pnpm run asbuild

      - name: Build headers example
        run: cd examples/headers && pnpm install && pnpm run asbuild

      - name: Build jwt example
        run: cd examples/jwt && pnpm install && pnpm run asbuild

      - name: Build KvStore example
        run: cd examples/kvStore && pnpm install && pnpm run asbuild

      - name: Build properties example
        run: cd examples/properties && pnpm install && pnpm run asbuild

      - name: Build variablesAndSecrets example
        run: cd examples/variablesAndSecrets && pnpm install && pnpm run asbuild
